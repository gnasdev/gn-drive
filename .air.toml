# .air.toml — Go hot-reload for `task dev` (air v1.62+ / air-verse/air).
# Docs: https://github.com/air-verse/air
#
# Note: air v1.62 uses `bin` + `args_bin` / `full_bin`, NOT `entrypoint`.
# A previous config only set `entrypoint`, so air fell back to ./tmp/main
# (exit 127 — binary missing) while `cmd` wrote ./tmp/gn-drive.

root = "."
tmp_dir = "tmp"

[build]
  # Build the portal binary into tmp/ (watched dir is excluded from rebuilds).
  cmd = "go build -trimpath -o ./tmp/gn-drive ./cmd/gn-drive"
  bin = "./tmp/gn-drive"
  # Bare binary only prints help; must run the `run` subcommand.
  # Keep --port in sync with frontend/vite.config.ts proxy default (53241).
  full_bin = "./tmp/gn-drive run --no-browser --dev --port 53241"
  # Delay (ms) before rebuild — Vite --watch fires often; avoid mid-bundle restarts.
  delay = 800
  # Do not start a previous binary if build failed.
  stop_on_error = true
  # go:embed bakes webui at compile time; watch dist assets so UI rebuild restarts Go.
  include_ext = ["go", "html", "js", "css", "tpl", "tmpl"]
  exclude_dir = [
    "assets",
    "tmp",
    "vendor",
    "testdata",
    "frontend/node_modules",
    "frontend/dist",
    "frontend/e2e",
    "bin",
    ".git",
    "scripts",
    "docs",
  ]
  exclude_regex = ["_test.go"]
  log = "build-errors.log"
  send_interrupt = true
  kill_delay = "2s"

[log]
  time = false
  main_only = false

[color]
  app = "cyan"
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
