# GN Drive note: Defines task shortcuts for building, testing, and running GN Drive workflows.
version: "3"

vars:
  APP_NAME: "gn-drive"
  BIN_DIR: "bin"
  VITE_PORT: "{{.WAILS_VITE_PORT | default 9245}}"
  WAILS3_BIN: "$(go env GOPATH)/bin/wails3"
  VERSION: '{{.VERSION | default "dev"}}'
  COMMIT: '{{.COMMIT | default "unknown"}}'

tasks:
  install:
    summary: Installs backend and frontend dependencies
    cmds:
      - task: install:be
      - task: install:fe
      - task: prepare:bindings
      - task: prepare:embed-assets

  install:be:
    summary: Installs backend dependencies
    dir: desktop
    cmds:
      - go mod download
      - go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.89

  install:fe:
    summary: Installs frontend dependencies
    dir: desktop/frontend
    cmds:
      - bun install

  prepare:embed-assets:
    internal: true
    summary: Creates the minimal frontend dist required by Go embed during dev
    dir: desktop
    cmds:
      - mkdir -p frontend/dist/browser
      - test -f frontend/dist/browser/index.html || printf '<!doctype html><html><head><meta charset="utf-8"><title>GN Drive</title></head><body><app-root></app-root></body></html>\n' > frontend/dist/browser/index.html

  prepare:bindings:
    internal: true
    summary: Generates Wails bindings and exposes the legacy wailsjs import path
    dir: desktop
    cmds:
      - "{{.WAILS3_BIN}} generate bindings -ts"
      - ln -sfn bindings frontend/wailsjs

  build:
    summary: Builds the application for production
    dir: desktop
    cmds:
      - task: prepare:bindings
      - cd frontend && bun install --frozen-lockfile && bun run build
      - go build -trimpath -ldflags="-s -w -X main.Version={{.VERSION}} -X main.Commit={{.COMMIT}}" -o {{.BIN_DIR}}/{{.APP_NAME}}
      - mv {{.BIN_DIR}}/{{.APP_NAME}} ../{{.APP_NAME}}

  build:dev:
    summary: Builds the application for development (with debug info)
    dir: desktop
    cmds:
      - task: prepare:bindings
      - cd frontend && bun install && bun run build
      - go build -o {{.BIN_DIR}}/{{.APP_NAME}}
      - mv {{.BIN_DIR}}/{{.APP_NAME}} ../{{.APP_NAME}}

  dev:
    summary: Runs the application in development mode
    dir: desktop
    env:
      NS_DRIVE_DEBUG: "true"
    cmds:
      - echo "Starting Wails development mode (debug mode enabled)..."
      - echo "Wails will start the frontend dev server on port {{.VITE_PORT}}"
      - task: prepare:embed-assets
      - "{{.WAILS3_BIN}} dev -config ./build/config.yml -port {{.VITE_PORT}}"

  lint:fe:
    summary: Runs ESLint on the frontend code
    dir: desktop/frontend
    cmds:
      - echo "Running frontend linting..."
      - bun run lint

  lint:be:
    summary: Runs golangci-lint on the backend code
    dir: desktop
    cmds:
      - echo "Running backend linting..."
      - golangci-lint run

  lint:
    summary: Runs linting on both frontend and backend
    cmds:
      - task: lint:fe
      - task: lint:be

  test:
    summary: Runs all tests
    cmds:
      - task: test:be
      - task: test:fe

  test:be:
    summary: Runs Go backend tests
    dir: desktop
    cmds:
      - echo "Running backend tests..."
      - go test -v ./...

  test:fe:
    summary: Runs Angular frontend tests
    dir: desktop/frontend
    cmds:
      - echo "Running frontend tests..."
      - bun run test --watch=false --browsers=ChromeHeadless

  test:be:coverage:
    summary: Runs Go backend tests with coverage
    dir: desktop
    cmds:
      - echo "Running backend tests with coverage..."
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at desktop/coverage.html"

  build:macos:
    summary: Builds macOS .app bundle with code signing
    vars:
      BUNDLE_ID: '{{.BUNDLE_ID | default "com.gndrive.app"}}'
      APP_DISPLAY_NAME: '{{.APP_DISPLAY_NAME | default "GN Drive"}}'
      SIGNING_IDENTITY: '{{.SIGNING_IDENTITY | default "-"}}'
    cmds:
      - task: build:macos:bundle
      - task: build:macos:sign

  build:macos:bundle:
    summary: Creates macOS .app bundle structure
    vars:
      BUNDLE_ID: '{{.BUNDLE_ID | default "com.gndrive.app"}}'
      APP_DISPLAY_NAME: '{{.APP_DISPLAY_NAME | default "GN Drive"}}'
    dir: desktop
    cmds:
      - echo "Generating bindings..."
      - task: prepare:bindings
      - echo "Building frontend..."
      - cd frontend && bun install --frozen-lockfile && bun run build
      - echo "Building backend..."
      - mkdir -p {{.BIN_DIR}}
      - go build -trimpath -ldflags="-s -w -X main.Version={{.VERSION}}" -o {{.BIN_DIR}}/{{.APP_NAME}}
      - echo "Creating app bundle..."
      - mkdir -p {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/MacOS
      - mkdir -p {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/Resources
      - cp {{.BIN_DIR}}/{{.APP_NAME}} {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/MacOS/
      - |
        cat > {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
            <dict>
                <key>CFBundlePackageType</key>
                <string>APPL</string>
                <key>CFBundleName</key>
                <string>{{.APP_DISPLAY_NAME}}</string>
                <key>CFBundleExecutable</key>
                <string>{{.APP_NAME}}</string>
                <key>CFBundleIdentifier</key>
                <string>{{.BUNDLE_ID}}</string>
                <key>CFBundleVersion</key>
                <string>{{.VERSION}}</string>
                <key>CFBundleShortVersionString</key>
                <string>{{.VERSION}}</string>
                <key>CFBundleIconFile</key>
                <string>iconfile</string>
                <key>LSMinimumSystemVersion</key>
                <string>10.13.0</string>
                <key>NSHighResolutionCapable</key>
                <true/>
            </dict>
        </plist>
        EOF
      - echo -n "APPL????" > {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/PkgInfo
      - task: build:macos:icon
      - rm -rf ../{{.APP_NAME}}.app
      - cp -R {{.BIN_DIR}}/{{.APP_NAME}}.app ../{{.APP_NAME}}.app
      - echo "App bundle created at {{.APP_NAME}}.app"

  build:macos:icon:
    summary: Creates macOS app icon (icns)
    dir: desktop
    cmds:
      - mkdir -p /tmp/gn-drive-icons.iconset
      - sips -z 16 16 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_16x16.png >/dev/null 2>&1
      - sips -z 32 32 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_16x16@2x.png >/dev/null 2>&1
      - sips -z 32 32 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_32x32.png >/dev/null 2>&1
      - sips -z 64 64 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_32x32@2x.png >/dev/null 2>&1
      - sips -z 128 128 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_128x128.png >/dev/null 2>&1
      - sips -z 256 256 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_128x128@2x.png >/dev/null 2>&1
      - sips -z 256 256 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_256x256.png >/dev/null 2>&1
      - sips -z 512 512 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_256x256@2x.png >/dev/null 2>&1
      - sips -z 512 512 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_512x512.png >/dev/null 2>&1
      - sips -z 1024 1024 build/appicon.png --out /tmp/gn-drive-icons.iconset/icon_512x512@2x.png >/dev/null 2>&1
      - iconutil -c icns /tmp/gn-drive-icons.iconset -o {{.BIN_DIR}}/{{.APP_NAME}}.app/Contents/Resources/iconfile.icns
      - rm -rf /tmp/gn-drive-icons.iconset

  build:macos:sign:
    summary: Signs the macOS app bundle
    vars:
      SIGNING_IDENTITY: '{{.SIGNING_IDENTITY | default "-"}}'
    cmds:
      - echo "Signing app bundle..."
      - codesign --force --deep --sign "{{.SIGNING_IDENTITY}}" {{.APP_NAME}}.app
      - codesign --verify --verbose {{.APP_NAME}}.app
      - echo "App signed successfully"

  clean:
    summary: Cleans build artifacts
    cmds:
      - rm -f gn-drive
      - rm -rf gn-drive.app
      - rm -rf desktop/bin
      - rm -rf desktop/frontend/dist
      - rm -rf desktop/frontend/node_modules/.cache
      - echo "Cleaned build artifacts"
