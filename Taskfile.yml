# GN Drive task definitions.
#
# Single-process CLI + Vue 3 web UI. One binary, one process, one port.
# See docs/overview.md and DEVELOPER.md.

version: "3"

vars:
  APP_NAME: "gn-drive"
  BIN_DIR: "bin"
  VERSION: '{{.VERSION | default "dev"}}'
  COMMIT: '{{.COMMIT | default "unknown"}}'
  LDFLAGS: "-s -w -X main.Version={{.VERSION}} -X main.Commit={{.COMMIT}}"

tasks:
  install:
    summary: Install backend (go mod) + frontend (pnpm) dependencies
    cmds:
      - go mod download
      - cd frontend && pnpm install --frozen-lockfile

  build:
    summary: Build web stack — Vue 3 frontend embedded into the Go binary
    cmds:
      - cd frontend && pnpm install --frozen-lockfile && pnpm run build
      - rm -rf internal/webui/dist
      - cp -r frontend/dist internal/webui/dist
      - go build -trimpath -ldflags="{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.APP_NAME}} ./cmd/gn-drive
      - echo "Built {{.BIN_DIR}}/{{.APP_NAME}} (Version={{.VERSION}} Commit={{.COMMIT}})"

  dev:
    summary: Run dev mode — Vue rebuild on change + Go hot reload (air) in parallel; Go serves Vue dist via SPA route
    cmds:
      - scripts/dev.sh

  doctor:
    summary: Diagnose environment via gn-drive doctor
    cmds:
      - go run ./cmd/gn-drive doctor

  test:
    summary: Run backend tests, frontend type-check, and e2e coverage gate
    cmds:
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - cd frontend && pnpm run type-check
      - cd frontend && pnpm run test:e2e:coverage

  lint:
    summary: Lightweight lint — go vet + frontend type-check
    cmds:
      - go vet ./...
      - cd frontend && pnpm run type-check

  clean:
    summary: Clean build artifacts
    cmds:
      - rm -rf {{.BIN_DIR}}
      - rm -f {{.APP_NAME}} {{.APP_NAME}}-dev
      - rm -rf frontend/dist
      - rm -rf internal/webui/dist
      - echo "Cleaned build artifacts"
